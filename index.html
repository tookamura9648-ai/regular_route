<body>

<script>
/* ===== CSVïŋ―Ėęïŋ―FVercelïŋ―Éuïŋ―ïŋ―ïŋ―ïŋ―CSVïŋ―ïŋ―ĮÞiïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ßj ===== */
const CSV_URL = "https://raw.githubusercontent.com/tookamura9648-ai/regular_route/main/data/ïŋ―Zïŋ―ïŋ―ïŋ―^.csv";

let entries = [];
let filteredEntries = [];

const fileInput  = document.getElementById("csvFile");
const statusEl   = document.getElementById("status");
const reloadBtn  = document.getElementById("reloadGitHub");
const listEl     = document.getElementById("list");
const summaryEl  = document.getElementById("summary");
const areaFilter = document.getElementById("areaFilter");
const typeFilter = document.getElementById("typeFilter");
const startBtn   = document.getElementById("startBtn");
const areaLabel = document.getElementById("areaLabel");
const typeLabel = document.getElementById("typeLabel");

function updateSelectLabels(){
  const areaText = areaFilter.options[areaFilter.selectedIndex]?.textContent || "ïŋ―ïŋ―ïŋ―Ũïŋ―";
  const typeText = typeFilter.options[typeFilter.selectedIndex]?.textContent || "ïŋ―wïŋ―ïŋ―Čïŋ―";
  areaLabel.textContent = areaText;
  typeLabel.textContent = typeText;
}


/* ===== ïŋ―\ïŋ―ïŋ―ïŋ―F3ïŋ―bïŋ―Åtïŋ―Fïŋ―[ïŋ―hïŋ―ïŋ―DOMïŋ―í ===== */
window.addEventListener("load", ()=>{
  const cover = document.getElementById("coverSplash");
  const SHOW_MS = 3000;
  setTimeout(()=>{
    cover.classList.add("fadeout");
    setTimeout(()=> cover.remove(), 1500);
  }, SHOW_MS);
});

/* ===== CSVïŋ―ĮÝïŋ―ïŋ―ïŋ― ===== */
async function loadCsv(){
  statusEl.textContent = "CSVïŋ―ĮÝïŋ―ïŋ―Ýïŋ―ïŋ―c";
  try{
    const res = await fetch(CSV_URL, { cache:"no-cache" });
    if(!res.ok) throw new Error("HTTP " + res.status);

    const buf = await res.arrayBuffer();
    let text;
    try{
      text = new TextDecoder("shift_jis").decode(buf);
    }catch(_e){
      text = new TextDecoder("utf-8").decode(buf);
    }

    const parsed = parseCsvToEntries(text);
    entries = parsed;
    statusEl.textContent = `ïŋ―ĮÝïŋ―ïŋ―Ýïŋ―ïŋ―ïŋ―ïŋ―i${entries.length}ïŋ―ïŋ―ïŋ―j`;
    initFilters();
    updateSelectLabels();
    applyFilterAndRender();
  }catch(e){
    console.error(e);
    statusEl.textContent = "CSVïŋ―ĮÝïŋ―ïŋ―ÝÉïŋ―ïŋ―sïŋ―ïŋ―ïŋ―Üïŋ―ïŋ―ïŋ―ïŋ―Bïŋ―pïŋ―Xïŋ―ïŋ―ïŋ―ïŋ―Jïŋ―Ýïŋ―ïŋ―ïŋ―mïŋ―Fïŋ―ïŋ―ïŋ―Äïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―B";
    entries = [];
    initFilters();
    updateSelectLabels();
    applyFilterAndRender();
  }
}

reloadBtn.addEventListener("click", loadCsv);

/* ïŋ―ïŋ―ïŋ―[ïŋ―Jïŋ―ïŋ―CSV */
fileInput.addEventListener("change",(e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    const text = ev.target.result;
    const parsed = parseCsvToEntries(text);
    if(parsed.length === 0){ alert("ïŋ―Lïŋ―ïŋ―ïŋ―Čfïŋ―[ïŋ―^ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―Üïŋ―ïŋ―ïŋ―Åïŋ―ïŋ―ïŋ―ïŋ―B"); return; }
    entries = parsed;
    statusEl.textContent = `ïŋ―ïŋ―ïŋ―[ïŋ―Jïŋ―ïŋ―CSVïŋ―ïŋ―ĮÝïŋ―ïŋ―ÝÜïŋ―ïŋ―ïŋ―ïŋ―i${entries.length}ïŋ―ïŋ―ïŋ―j`;
    initFilters();
    applyFilterAndRender();
  };
  reader.readAsText(file, "Shift_JIS");
});

/* CSVïŋ―pïŋ―[ïŋ―T */
function parseCSV(text){
  const rows=[]; let row=[]; let field=""; let inQuotes=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(c === '"'){
      if(inQuotes && text[i+1] === '"'){ field+='"'; i++; }
      else inQuotes = !inQuotes;
    }else if(c === "," && !inQuotes){
      row.push(field); field="";
    }else if((c === "\n" || c === "\r") && !inQuotes){
      if(c === "\r" && text[i+1] === "\n") i++;
      row.push(field); rows.push(row);
      row=[]; field="";
    }else{
      field += c;
    }
  }
  if(field.length>0 || row.length>0){ row.push(field); rows.push(row); }
  return rows;
}

function normalizeCount(v){
  const s = (v ?? "").toString().trim();
  if(!s) return 1;
  const n = Number(s.replace(/,/g,""));
  return Number.isFinite(n) && n > 0 ? n : 1;
}

function buildPaperTypeString(pairs){
  return pairs
    .filter(x => x.paper)
    .map(({paper, count}) => count > 1 ? `${paper}ïŋ―~${count}` : paper)
    .join(" / ");
}

/**
 * ïŋ―VCSV:
 * ïŋ―ïŋ―ïŋ―,ïŋ―Ôïŋ―,ïŋ―ïŋ―ïŋ―1,ïŋ―ïŋ―ïŋ―ïŋ―1,ïŋ―ïŋ―ïŋ―2,ïŋ―ïŋ―ïŋ―ïŋ―2,ïŋ―ïŋ―ïŋ―3,ïŋ―ïŋ―ïŋ―ïŋ―3,ïŋ―ïŋ―ïŋ―Lïŋ―ïŋ―ïŋ―ïŋ―,ïŋ―ïŋ―ïŋ―O,ïŋ―Zïŋ―ïŋ―1,ïŋ―Zïŋ―ïŋ―2,ïŋ―ĮŌÔïŋ―,[ïŋ―Üx,ïŋ―oïŋ―x,...]
 */
function parseCsvToEntries(csvText){
  const rows = parseCSV(csvText);
  const result = [];
  if(!rows || rows.length === 0) return result;

  rows.forEach((colsRaw, idx) => {
    const cols = colsRaw.map(c => (c || "").trim());
    if(cols.every(c => c === "")) return;

    const joined = cols.join("");
    if(
      idx === 0 &&
      /ïŋ―ïŋ―ïŋ―|ïŋ―Ôïŋ―|ïŋ―ïŋ―ïŋ―1|ïŋ―ïŋ―ïŋ―2|ïŋ―ïŋ―ïŋ―3|ïŋ―ïŋ―ïŋ―ïŋ―|ïŋ―ïŋ―ïŋ―Lïŋ―ïŋ―ïŋ―ïŋ―|ïŋ―ïŋ―ïŋ―O|ïŋ―Zïŋ―ïŋ―1|ïŋ―Zïŋ―ïŋ―2|ïŋ―ĮŌÔïŋ―|ïŋ―Üx|ïŋ―oïŋ―x|captured_at|capture_source/i.test(joined)
    ){
      return;
    }

    const area     = cols[0]  || "";
    const rowNo    = cols[1]  || "";

    const paper1   = cols[2]  || "";
    const count1   = normalizeCount(cols[3]);

    const paper2   = cols[4]  || "";
    const count2   = normalizeCount(cols[5]);

    const paper3   = cols[6]  || "";
    const count3   = normalizeCount(cols[7]);

    const note     = cols[8]  || "";
    const name     = cols[9]  || "";
    const addr1    = cols[10] || "";
    const addr2raw = cols[11] || "";
    const readerNo = cols[12] || "";

    if(!name && !addr1) return;

    const addr2 = addr2raw && addr2raw !== "ïŋ―@" ? addr2raw : "";
    const addr3 = "";
    const no = rowNo || readerNo;

    const type = buildPaperTypeString([
      { paper: paper1, count: count1 },
      { paper: paper2, count: count2 },
      { paper: paper3, count: count3 }
    ]);

    let lat = null, lng = null;
    if(cols.length >= 15){
      const latNum = Number((cols[13] || "").replace(/,/g,""));
      const lngNum = Number((cols[14] || "").replace(/,/g,""));
      if(!Number.isNaN(latNum) && !Number.isNaN(lngNum)){
        lat = latNum;
        lng = lngNum;
      }
    }

    result.push({
      no, type, name, addr1, addr2, addr3, lat, lng, area, note,
      paper1, count1, paper2, count2, paper3, count3, readerNo
    });
  });

  return result;
}

/* ïŋ―tïŋ―Bïŋ―ïŋ―ïŋ―^ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ― */
function initFilters(){
  const areas = new Set();
  entries.forEach(e => { if(e.area) areas.add(e.area); });

  areaFilter.innerHTML = '<option value="">ïŋ―iïŋ―ïŋ―ïŋ―Fïŋ―ïŋ―ïŋ―ŨÄj</option>';
  Array.from(areas).sort().forEach(a=>{
    const opt = document.createElement("option");
    opt.value = a; opt.textContent = a;
    areaFilter.appendChild(opt);
  });

  typeFilter.innerHTML = `
    <option value="">ïŋ―iïŋ―Vïŋ―ïŋ―ïŋ―ïŋ―Fïŋ―ïŋ―ïŋ―ŨÄj</option>
    <option value="morning">ïŋ―ïŋ―ïŋ―ïŋ―</option>
    <option value="evening">ïŋ―[ïŋ―ïŋ―</option>
  `;
}
initFilters();
updateSelectLabels();
applyFilterAndRender();


function hasEvening(typeStr){ return /ïŋ―ïŋ―Z|ïŋ―ïŋ―ïŋ―oïŋ―Z|ïŋ―ïŋ―ïŋ―oïŋ―ïŋ―/.test(typeStr || ""); }
function matchTypeFilter(typeVal, entryType){
  if(!typeVal) return true;
  const evening = hasEvening(entryType);
  if(typeVal === "evening") return evening;
  if(typeVal === "morning") return !evening;
  return true;
}

areaFilter.addEventListener("change", () => {
  updateSelectLabels();
  applyFilterAndRender();
});
typeFilter.addEventListener("change", () => {
  updateSelectLabels();
  applyFilterAndRender();
});


function applyFilterAndRender(){
  const areaVal = areaFilter.value;
  const typeVal = typeFilter.value;

  filteredEntries = entries.filter(e=>{
    if(areaVal && e.area !== areaVal) return false;
    if(!matchTypeFilter(typeVal, e.type || "")) return false;
    return true;
  });

  renderList();
}

function renderList(){
  listEl.innerHTML = "";
  summaryEl.textContent = `ïŋ―ïŋ―ïŋ―ïŋ―: ${filteredEntries.length}ïŋ―ïŋ―ïŋ―iïŋ―Sïŋ―ïŋ―: ${entries.length}ïŋ―ïŋ―ïŋ―j`;

  if(filteredEntries.length===0){
    listEl.textContent = "ïŋ―Yïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―fïŋ―[ïŋ―^ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―Üïŋ―ïŋ―ïŋ―B";
    return;
  }

  filteredEntries.forEach(e=>{
    const row=document.createElement("div");
    row.className="row";

    const header=document.createElement("div");
    header.className="row-header";
    header.innerHTML = `
      <span>No: ${escapeHtml(e.no)}</span>
      ${e.area ? `<span class="chip chip-area">${escapeHtml(e.area)}</span>` : ""}
      ${e.type ? `<span class="chip chip-type">${escapeHtml(e.type)}</span>` : ""}
    `;

    const main=document.createElement("div");
    main.className="row-main";
    main.innerHTML = `
      <span class="name">${escapeHtml(e.name||"")}</span>
      <span class="addr">${escapeHtml([e.addr1,e.addr2,e.addr3].filter(Boolean).join(" "))}</span>
    `;

    row.appendChild(header);
    row.appendChild(main);

    if(e.note){
      const note=document.createElement("div");
      note.className="note";
      note.textContent = `ïŋ―ïŋ―ïŋ―l: ${e.note}`;
      row.appendChild(note);
    }

    listEl.appendChild(row);
  });
}

function escapeHtml(s){
  return (s||"").replace(/[&<>"']/g, m=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));
}

/* ïŋ―ïŋ―ïŋ―Hïŋ―ïŋ―ïŋ―ïŋ― */
startBtn.addEventListener("click", ()=>{
  const areaVal = areaFilter.value || "";
  const typeVal = typeFilter.value || "";
  const params = new URLSearchParams();
  if(areaVal) params.set("area", areaVal);
  if(typeVal) params.set("type", typeVal);

  const url = params.toString()
    ? `route.html?${params.toString()}`
    : `route.html`;
  window.location.href = url;
});

window.addEventListener("load", loadCsv);
</script>
